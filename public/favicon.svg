<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#f5f5f0"/>
  <!-- Grid lines (checker-paper signature) -->
  <line x1="0" y1="16" x2="64" y2="16" stroke="#c0c0b8" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="32" x2="64" y2="32" stroke="#c0c0b8" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="48" x2="64" y2="48" stroke="#c0c0b8" stroke-width="0.5" opacity="0.4"/>
  <line x1="16" y1="0" x2="16" y2="64" stroke="#c0c0b8" stroke-width="0.5" opacity="0.4"/>
  <line x1="32" y1="0" x2="32" y2="64" stroke="#c0c0b8" stroke-width="0.5" opacity="0.4"/>
  <line x1="48" y1="0" x2="48" y2="64" stroke="#c0c0b8" stroke-width="0.5" opacity="0.4"/>
  <!-- Eye/lens shape — the "view" -->
  <ellipse cx="32" cy="32" rx="22" ry="14" fill="none" stroke="#2255aa" stroke-width="2.5"/>
  <!-- Iris -->
  <circle cx="32" cy="32" r="9" fill="none" stroke="#7744bb" stroke-width="2"/>
  <!-- Pupil with gradient feel -->
  <circle cx="32" cy="32" r="5" fill="#2255aa"/>
  <!-- Light refraction — the "clair" -->
  <circle cx="29" cy="30" r="1.8" fill="#fff" opacity="0.9"/>
  <!-- Color spectrum rays — routing/multi-provider -->
  <line x1="10" y1="22" x2="16" y2="26" stroke="#cc3344" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="8" y1="32" x2="14" y2="32" stroke="#1a8a3a" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="10" y1="42" x2="16" y2="38" stroke="#1088aa" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="48" y1="26" x2="54" y2="22" stroke="#c07020" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="50" y1="32" x2="56" y2="32" stroke="#7744bb" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="48" y1="38" x2="54" y2="42" stroke="#2255aa" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
</svg>
