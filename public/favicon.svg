<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1a2e"/>
  <!-- Document body -->
  <rect x="18" y="12" width="28" height="36" rx="3" fill="#e8e8f0" stroke="#2244aa" stroke-width="1.5"/>
  <!-- Folded corner -->
  <path d="M38 12 L46 20 L38 20 Z" fill="#c8c8dc" stroke="#2244aa" stroke-width="1"/>
  <!-- Code lines (blue) -->
  <rect x="22" y="24" width="18" height="2.5" rx="1" fill="#2244aa"/>
  <rect x="22" y="30" width="14" height="2.5" rx="1" fill="#4466cc"/>
  <rect x="22" y="36" width="20" height="2.5" rx="1" fill="#2244aa"/>
  <!-- Red accent dot — inspection -->
  <circle cx="40" cy="42" r="4" fill="#cc3344"/>
  <!-- Magnifying glass handle -->
  <line x1="43" y1="45" x2="48" y2="50" stroke="#cc3344" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Subtle ring on magnifier -->
  <circle cx="40" cy="42" r="4" fill="none" stroke="#ff5566" stroke-width="1" opacity="0.5"/>
</svg>
