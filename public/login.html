<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claude-doc - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1b26;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      color: #c0caf5;
    }
    .login-box {
      background: #24283b;
      border: 1px solid #414868;
      border-radius: 8px;
      padding: 32px;
      width: 340px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 11px;
      color: #565f89;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #565f89;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 8px 12px;
      background: #1a1b26;
      border: 1px solid #414868;
      border-radius: 4px;
      color: #c0caf5;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }
    input[type="password"]:focus {
      border-color: #7aa2f7;
    }
    .error {
      font-size: 11px;
      color: #f7768e;
      margin-top: 8px;
      display: none;
    }
    .error.visible { display: block; }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 8px;
      background: #7aa2f7;
      color: #1a1b26;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #89b4fa; }
  </style>
</head>
<body>
  <form class="login-box" method="POST" action="/login">
    <h1>claude-doc</h1>
    <div class="subtitle">Enter your auth token to continue</div>
    <label for="token">Auth token</label>
    <input type="password" id="token" name="token" autocomplete="off" autofocus required>
    <div class="error" id="error">Invalid token</div>
    <button type="submit">Login</button>
  </form>
  <script>
    if (location.search.includes('error=1')) {
      document.getElementById('error').classList.add('visible');
    }
  </script>
</body>
</html>
